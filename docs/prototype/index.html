<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>畅选日历 - 登录</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    /* 登录页特定样式 */
    .login-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    .login-header {
      text-align: center;
      padding: 60px 20px 40px;
      color: white;
    }

    .login-logo {
      font-size: 3rem;
      margin-bottom: 16px;
    }

    .login-title {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .login-subtitle {
      font-size: 1rem;
      opacity: 0.9;
    }

    .login-card {
      background-color: white;
      border-radius: 24px 24px 0 0;
      flex: 1;
      padding: 32px 24px;
      margin-top: auto;
    }

    .login-tabs {
      display: flex;
      margin-bottom: 24px;
      border-bottom: 2px solid #e5e7eb;
    }

    .login-tab {
      flex: 1;
      padding: 12px;
      text-align: center;
      font-weight: 500;
      color: #6b7280;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: all 0.2s ease;
    }

    .login-tab.active {
      color: #2563eb;
      border-bottom-color: #2563eb;
    }

    .login-form {
      display: none;
    }

    .login-form.active {
      display: block;
    }

    .phone-input-group {
      display: flex;
      gap: 8px;
    }

    .country-code {
      width: 80px;
      text-align: center;
    }

    .send-code-btn {
      white-space: nowrap;
      padding: 8px 16px;
      font-size: 0.875rem;
    }

    .agreement {
      font-size: 0.75rem;
      color: #6b7280;
      margin-top: 16px;
      text-align: center;
    }

    .agreement a {
      color: #2563eb;
    }

    .student-verify-section {
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid #e5e7eb;
    }

    .student-verify-title {
      font-size: 0.875rem;
      color: #374151;
      margin-bottom: 12px;
    }

    .upload-area {
      border: 2px dashed #d1d5db;
      border-radius: 12px;
      padding: 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .upload-area:hover {
      border-color: #2563eb;
      background-color: #f0f7ff;
    }

    .upload-icon {
      font-size: 2rem;
      margin-bottom: 8px;
    }

    .upload-text {
      font-size: 0.875rem;
      color: #6b7280;
    }

    .upload-hint {
      font-size: 0.75rem;
      color: #9ca3af;
      margin-top: 4px;
    }

    .feature-list {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid #e5e7eb;
    }

    .feature-item {
      text-align: center;
    }

    .feature-icon {
      font-size: 1.5rem;
      margin-bottom: 8px;
    }

    .feature-text {
      font-size: 0.75rem;
      color: #6b7280;
    }

    /* 状态切换控件 */
    .prototype-controls {
      position: fixed;
      top: 10px;
      right: 10px;
      background: rgba(0,0,0,0.8);
      color: white;
      padding: 12px;
      border-radius: 8px;
      font-size: 12px;
      z-index: 1000;
    }

    .prototype-controls button {
      display: block;
      width: 100%;
      margin: 4px 0;
      padding: 6px 12px;
      background: #333;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    .prototype-controls button:hover {
      background: #555;
    }
  </style>
</head>
<body>
  <!-- 原型状态切换控件 -->
  <div class="prototype-controls">
    <div style="font-weight:600;margin-bottom:8px;">原型状态切换</div>
    <button onclick="setState('default')">默认状态</button>
    <button onclick="setState('loading')">加载中</button>
    <button onclick="setState('error')">验证码错误</button>
    <button onclick="setState('success')">登录成功</button>
  </div>

  <div class="login-page">
    <div class="login-header">
      <div class="login-logo">📅</div>
      <h1 class="login-title">畅选日历</h1>
      <p class="login-subtitle">帮你看清职业真相</p>
    </div>

    <div class="login-card">
      <!-- 登录方式切换 -->
      <div class="login-tabs">
        <div class="login-tab active" onclick="switchTab('phone')">手机登录</div>
        <div class="login-tab" onclick="switchTab('wechat')">微信登录</div>
      </div>

      <!-- 手机号登录表单 -->
      <div id="phone-form" class="login-form active">
        <div class="form-group">
          <label class="form-label">手机号</label>
          <div class="phone-input-group">
            <input type="text" class="form-input country-code" value="+86" readonly>
            <input type="tel" class="form-input" id="phone" placeholder="请输入手机号" maxlength="11">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">验证码</label>
          <div class="phone-input-group">
            <input type="text" class="form-input" id="code" placeholder="请输入验证码" maxlength="6">
            <button class="btn btn-secondary send-code-btn" id="sendCodeBtn" onclick="sendCode()">获取验证码</button>
          </div>
        </div>

        <button class="btn btn-primary btn-block btn-lg mt-lg" onclick="login()">登录</button>

        <p class="agreement">
          登录即代表同意 <a href="#">《用户协议》</a> 和 <a href="#">《隐私政策》</a>
        </p>

        <!-- 学生证验证入口 -->
        <div class="student-verify-section">
          <div class="student-verify-title">验证学生身份，解锁完整功能</div>
          <div class="upload-area" onclick="uploadStudentId()">
            <div class="upload-icon">📷</div>
            <div class="upload-text">点击上传学生证照片</div>
            <div class="upload-hint">支持jpg、png格式，大小不超过5MB</div>
          </div>
        </div>
      </div>

      <!-- 微信登录表单 -->
      <div id="wechat-form" class="login-form">
        <div style="text-align: center; padding: 40px 0;">
          <div style="font-size: 4rem; margin-bottom: 16px;">📱</div>
          <p style="color: #6b7280; margin-bottom: 24px;">请使用微信扫描二维码登录</p>
          <div style="width: 200px; height: 200px; background: #f3f4f6; margin: 0 auto; display: flex; align-items: center; justify-content: center; border-radius: 8px;">
            <span style="color: #9ca3af;">二维码占位</span>
          </div>
        </div>
      </div>

      <!-- 功能亮点 -->
      <div class="feature-list">
        <div class="feature-item">
          <div class="feature-icon">🎯</div>
          <div class="feature-text">精准匹配</div>
        </div>
        <div class="feature-item">
          <div class="feature-icon">💬</div>
          <div class="feature-text">圆桌讨论</div>
        </div>
        <div class="feature-item">
          <div class="feature-icon">🗺️</div>
          <div class="feature-text">认知地图</div>
        </div>
      </div>
    </div>
  </div>

  <!-- 加载状态遮罩 -->
  <div id="loading-overlay" style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(255,255,255,0.9); z-index:1000; display:flex; align-items:center; justify-content:center;">
    <div style="text-align:center;">
      <div class="spinner"></div>
      <p style="margin-top:16px; color:#6b7280;">登录中...</p>
    </div>
  </div>

  <!-- 错误提示 -->
  <div id="error-toast" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#fef2f2; border:1px solid #fecaca; color:#dc2626; padding:16px 24px; border-radius:8px; z-index:1001;">
    验证码错误，请重新输入
  </div>

  <!-- 成功提示 -->
  <div id="success-toast" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#f0fdf4; border:1px solid #bbf7d0; color:#16a34a; padding:16px 24px; border-radius:8px; z-index:1001;">
    登录成功，正在跳转...
  </div>

  <script>
    // 切换登录方式
    function switchTab(tab) {
      document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.login-form').forEach(f => f.classList.remove('active'));

      if (tab === 'phone') {
        document.querySelector('.login-tab:first-child').classList.add('active');
        document.getElementById('phone-form').classList.add('active');
      } else {
        document.querySelector('.login-tab:last-child').classList.add('active');
        document.getElementById('wechat-form').classList.add('active');
      }
    }

    // 发送验证码
    let countdown = 0;
    function sendCode() {
      const phone = document.getElementById('phone').value;
      if (!/^1\d{10}$/.test(phone)) {
        alert('请输入正确的手机号');
        return;
      }

      const btn = document.getElementById('sendCodeBtn');
      countdown = 60;
      btn.disabled = true;

      const timer = setInterval(() => {
        countdown--;
        btn.textContent = `${countdown}s后重发`;
        if (countdown <= 0) {
          clearInterval(timer);
          btn.disabled = false;
          btn.textContent = '获取验证码';
        }
      }, 1000);

      // 模拟发送成功
      console.log('验证码已发送至:', phone);
    }

    // 登录
    function login() {
      const phone = document.getElementById('phone').value;
      const code = document.getElementById('code').value;

      if (!/^1\d{10}$/.test(phone)) {
        alert('请输入正确的手机号');
        return;
      }
      if (code.length !== 6) {
        alert('请输入6位验证码');
        return;
      }

      // 显示加载状态
      document.getElementById('loading-overlay').style.display = 'flex';

      // 模拟登录请求
      setTimeout(() => {
        document.getElementById('loading-overlay').style.display = 'none';
        // 跳转到日历页面
        window.location.href = 'calendar.html';
      }, 1500);
    }

    // 上传学生证
    function uploadStudentId() {
      alert('学生证上传功能开发中...\n\n原型说明：\n- 支持拍照或相册选择\n- 自动识别学生信息\n- 人工审核后解锁完整功能');
    }

    // 原型状态切换
    function setState(state) {
      const loadingOverlay = document.getElementById('loading-overlay');
      const errorToast = document.getElementById('error-toast');
      const successToast = document.getElementById('success-toast');

      // 重置所有状态
      loadingOverlay.style.display = 'none';
      errorToast.style.display = 'none';
      successToast.style.display = 'none';

      switch(state) {
        case 'loading':
          loadingOverlay.style.display = 'flex';
          break;
        case 'error':
          errorToast.style.display = 'block';
          setTimeout(() => {
            errorToast.style.display = 'none';
          }, 2000);
          break;
        case 'success':
          successToast.style.display = 'block';
          setTimeout(() => {
            window.location.href = 'calendar.html';
          }, 1500);
          break;
      }
    }
  </script>
</body>
</html>
